name: '🚀 Push Nix Image to Registry'
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label(s) for all jobs (string label or JSON array of labels)'
        required: true
        type: string
      package-name:
        description: 'Nix package name (e.g., zeus-image, ci-image)'
        required: true
        type: string
      registry:
        description: 'Container registry (default: ghcr.io)'
        required: false
        type: string
        default: 'ghcr.io'
      namespace:
        description: 'Registry namespace (e.g., org/repo)'
        required: true
        type: string
      image-name:
        description: 'Image name in registry (defaults to package-name without -image suffix)'
        required: false
        type: string
      tags:
        description: 'Comma-separated list of tags (e.g., latest,v1.0.0,pr-123)'
        required: true
        type: string
      system:
        description: 'Nix system (default: x86_64-linux)'
        required: false
        type: string
        default: 'x86_64-linux'
      repository:
        description: 'Repository to checkout'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
    secrets:
      REGISTRY_USERNAME:
        description: 'Registry username (defaults to github.actor)'
        required: false
      REGISTRY_PASSWORD:
        description: 'Registry password/token (usually GITHUB_TOKEN)'
        required: true
jobs:
  push-image:
    runs-on: ${{ startsWith(inputs.runs-on, '[') && fromJson(inputs.runs-on) || inputs.runs-on }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - name: Install Nix
        uses: jmmaloney4/toolbox/.github/actions/nix-setup@bc7846003f39ec61654d70f5cfd1413046b3b763 # main
        with:
          runs-on: ${{ inputs.runs-on }}
          cache: ${{ !contains(inputs.runs-on, 'self-hosted') }}
      - name: Push Nix Image
        uses: jmmaloney4/toolbox/.github/actions/push-nix-image@bc7846003f39ec61654d70f5cfd1413046b3b763 # main
        with:
          package-name: ${{ inputs.package-name }}
          registry: ${{ inputs.registry }}
          namespace: ${{ inputs.namespace }}
          image-name: ${{ inputs.image-name }}
          tags: ${{ inputs.tags }}
          system: ${{ inputs.system }}
          registry-username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
