name: 📌 add to project
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for the job'
        required: false
        default: 'self-hosted'
        type: string
      project_url:
        description: 'GitHub Project URL (e.g. https://github.com/orgs/ORG/projects/N or https://github.com/users/USER/projects/N)'
        required: false
        default: 'https://github.com/orgs/ergodicsystems/projects/1'
        type: string
      labeled:
        description: 'Optional comma-separated labels; omit or leave empty to add all matching events. When set, items are filtered per label-operator.'
        required: false
        default: ''
        type: string
      label-operator:
        description: 'How to apply labeled filter: AND, OR, or NOT (default OR)'
        required: false
        default: OR
        type: string
    secrets:
      github-token:
        description: 'GitHub personal access token with project write access'
        required: true
permissions:
  contents: read
jobs:
  add-to-project:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Add issue or PR to project
        uses: jmmaloney4/toolbox/.github/actions/add-to-project@main
        with:
          project-url: ${{ inputs.project_url }}
          github-token: ${{ secrets.github-token }}
          labeled: ${{ inputs.labeled }}
          label-operator: ${{ inputs.label-operator }}
