name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@73b0c490c72bbea2941cf44eb9b6bb127878c7ef # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
