name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@591ab2d08d3f590934b9dcf75c8c7ff084b469b0 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
