name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@164b0bf115f15c511ebb883d7e8149eef47eca84 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
