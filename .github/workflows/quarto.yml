name: 📊 quarto
on:
  push:
    branches: [main] # production deploys
  pull_request: # per‑PR preview deploys
    types: [opened, synchronize, reopened]
permissions: # required by the action
  actions: read # (only for private repos)
  contents: read
  deployments: write
  pull-requests: write
jobs:
  deploy:
    runs-on: ${{ vars.ACTIONS_RUNS_ON }}
    permissions:
      id-token: write
      actions: read
      contents: read
      deployments: write
      pull-requests: write
    env:
      DIST: research/_site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jmmaloney4/toolbox/.github/actions/nix-setup@bc7846003f39ec61654d70f5cfd1413046b3b763 # main
        with:
          runs-on: ${{ vars.ACTIONS_RUNS_ON }}
          cache: ${{ !contains(vars.ACTIONS_RUNS_ON, 'self-hosted') }}
      - name: Build site with Nix
        run: |
          nix develop -c quarto render ./research
      - name: Validate build output
        run: |
          if [ ! -d "${{ env.DIST }}" ]; then
            echo "Build output directory not found"
            exit 1
          fi
          if [ ! -f "${{ env.DIST }}/index.html" ]; then
            echo "Index page not generated"
            ls -la "${{ env.DIST }}"
            exit 1
          fi
      - name: Deploy to Cloudflare Pages
        id: pages
        uses: andykenward/github-actions-cloudflare-pages@1465d3fcd395b60fc734b2d397699a3ff3f4b834 # v3.3.2
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-project-name: zeus
          directory: ${{ env.DIST }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # main → production, everything else → preview
          github-environment: ${{ (github.ref == 'refs/heads/main' && 'research-production') || 'research-preview' }}
