name: 📌 add to project (dogfood)
on:
  issues:
    types: [opened, reopened, transferred, labeled]
  pull_request:
    types: [opened, reopened, labeled]
permissions:
  contents: read
jobs:
  add-to-project:
    # Secrets cannot be used in `if`; set PROJECT_URL when you want this enabled.
    if: vars.PROJECT_URL != ''
    uses: jmmaloney4/toolbox/.github/workflows/add-to-project.yml@ef8369640dd50c30532dd6e4a522a6e365ba6d42 # main
    with:
      project_url: ${{ vars.PROJECT_URL }}
    secrets:
      github-token: ${{ secrets.PROJECT_PAT }}
