name: 📌 add to project (dogfood)
on:
  issues:
    types: [opened, reopened, transferred, labeled]
  pull_request:
    types: [opened, reopened, labeled]
permissions:
  contents: read
jobs:
  add-to-project:
    # Secrets cannot be used in `if`; set PROJECT_URL when you want this enabled.
    if: vars.PROJECT_URL != ''
    uses: jmmaloney4/toolbox/.github/workflows/add-to-project.yml@e810f9d58eaf12b58af1ebef7968f684d2ee2030 # main
    with:
      project_url: ${{ vars.PROJECT_URL }}
    secrets:
      github-token: ${{ secrets.PROJECT_PAT }}
