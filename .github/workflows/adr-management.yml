name: 📝 adr
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for all jobs'
        required: false
        default: ubuntu-latest
        type: string
      repository:
        description: 'Repository to checkout and operate on (owner/repo)'
        required: true
        type: string
      ref:
        description: 'Git ref (SHA/branch) to checkout and operate on'
        required: true
        type: string
      head_ref:
        description: 'PR head branch name (human-readable, e.g. my-feature-branch)'
        required: true
        type: string
      base_ref:
        description: 'Base branch/ref to compare against (e.g., main)'
        required: false
        default: main
        type: string
      adr_glob:
        description: 'ADR file glob to watch (relative to repo root)'
        default: "docs/internal/designs/*.md"
        required: false
        type: string
      pr_number:
        description: 'Pull request number (required for commenting)'
        required: true
        type: number
      pr_url:
        description: 'Pull request URL (used in placeholder content)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  manage-adrs:
    name: "push placeholder to ${{ inputs.base_ref }}"
    if: github.actor != 'github-actions[bot]'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ inputs.base_ref }}"

      - name: Detect touched ADR files (for conflict check)
        id: detect
        env:
          ADR_GLOB: ${{ inputs.adr_glob }}
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          set -euo pipefail
          # FM-2 fix: use --diff-filter=AM so renamed/modified ADR files are
          # also recognised as "touched", not just newly-added ones.
          # This list is used ONLY by the conflict-check step below.
          TOUCHED_ADRS=$(git diff --name-only --diff-filter=AM "origin/${BASE_REF}..HEAD" -- "$ADR_GLOB" || true)
          if [ -z "$TOUCHED_ADRS" ]; then
            echo "has_touched_adrs=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_touched_adrs=true" >> "$GITHUB_OUTPUT"
            echo "Touched (added/modified) ADR files:"
            echo "$TOUCHED_ADRS"
          fi

      - name: Detect newly-added ADR files (for placeholder creation)
        id: detect_new
        env:
          ADR_GLOB: ${{ inputs.adr_glob }}
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          set -euo pipefail
          # Use --diff-filter=A (added only) so that modified ADRs are NOT
          # passed to create-adr-placeholder, which would overwrite existing
          # ADR content with stub placeholder content (data loss).
          NEW_ADRS=$(git diff --name-only --diff-filter=A "origin/${BASE_REF}..HEAD" -- "$ADR_GLOB" || true)
          if [ -z "$NEW_ADRS" ]; then
            echo "has_new_adrs=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_adrs=true" >> "$GITHUB_OUTPUT"
            echo "$NEW_ADRS" > /tmp/new_adrs.txt
            echo "Newly-added ADR files:"
            cat /tmp/new_adrs.txt
          fi

      - name: Check ADR number conflicts
        id: check
        uses: jmmaloney4/toolbox/.github/actions/check-adr-conflicts@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ inputs.repository }}
        with:
          base_ref: ${{ inputs.base_ref }}
          head_ref: ${{ inputs.head_ref }}
          adr_glob: ${{ inputs.adr_glob }}
          pr_number: ${{ inputs.pr_number }}

      - name: Create and push placeholder to main
        if: steps.detect_new.outputs.has_new_adrs == 'true' && steps.check.outputs.has_conflict == 'false'
        uses: jmmaloney4/toolbox/.github/actions/create-adr-placeholder@main
        with:
          adr_files: /tmp/new_adrs.txt
          pr_url: ${{ inputs.pr_url }}
          base_branch: ${{ inputs.base_ref }}

      - name: Post ADR check status comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ inputs.repository }}
          HAS_TOUCHED_ADRS: ${{ steps.detect.outputs.has_touched_adrs }}
          HAS_CONFLICT: ${{ steps.check.outputs.has_conflict }}
          PR_NUMBER: ${{ inputs.pr_number }}
          ADR_GLOB: ${{ inputs.adr_glob }}
        run: |
          set -euo pipefail

          # Unique marker so we can find and update this comment on subsequent runs.
          MARKER="<!-- adr-status-bot -->"

          if [ "${HAS_CONFLICT}" = "true" ]; then
            # Conflict body is already posted by the check-adr-conflicts action.
            # Update our sticky comment to reflect the failure so it stays current.
            body="${MARKER}
          **ADR conflict check failed.** Duplicate ADR numbers were detected (full-tree audit of \`${ADR_GLOB}\`). See the conflict comment above for details."
          elif [ "${HAS_TOUCHED_ADRS}" = "true" ]; then
            body="${MARKER}
          **ADR conflict check passed.** No duplicate ADR numbers detected (full-tree audit of \`${ADR_GLOB}\`)."
          else
            body="${MARKER}
          **ADR conflict check ran.** No new or modified ADR files detected in this PR; full-tree audit of \`${ADR_GLOB}\` passed with no conflicts."
          fi

          # Look for an existing comment containing our marker.
          COMMENT_ID=$(gh api \
            "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -n1)

          if [ -n "$COMMENT_ID" ]; then
            # Update the existing comment in place.
            gh api \
              --method PATCH \
              "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" \
              --field body="$body"
          else
            # First run: create a new comment.
            gh pr comment "$PR_NUMBER" --body "$body" --repo "$GH_REPO"
          fi
