name: 📝 adr
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for all jobs'
        required: false
        default: ubuntu-latest
        type: string
      repository:
        description: 'Repository to checkout and operate on (owner/repo)'
        required: true
        type: string
      ref:
        description: 'Git ref (SHA/branch) to checkout and operate on'
        required: true
        type: string
      base_ref:
        description: 'Base branch/ref to compare against (e.g., main)'
        required: false
        default: main
        type: string
      adr_glob:
        description: 'ADR file glob to watch (relative to repo root)'
        default: "docs/internal/designs/*.md"
        required: false
        type: string
      pr_number:
        description: 'Pull request number (required for commenting)'
        required: true
        type: number
      pr_url:
        description: 'Pull request URL (used in placeholder content)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  manage-adrs:
    name: "push placeholder to ${{ inputs.base_ref }}"
    if: github.actor != 'github-actions[bot]'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ inputs.base_ref }}"

      - name: Detect new ADR files
        id: detect
        env:
          ADR_GLOB: ${{ inputs.adr_glob }}
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          set -euo pipefail
          # FM-2 fix: use --diff-filter=AM so renamed/modified ADR files are
          # also recognised as "touched", not just newly-added ones.
          NEW_ADRS=$(git diff --name-only --diff-filter=AM "origin/${BASE_REF}..HEAD" -- "$ADR_GLOB" || true)
          if [ -z "$NEW_ADRS" ]; then
            echo "has_new_adrs=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_adrs=true" >> "$GITHUB_OUTPUT"
            echo "$NEW_ADRS" > /tmp/new_adrs.txt
            echo "New/modified ADR files:"
            cat /tmp/new_adrs.txt
          fi

      - name: Check ADR number conflicts
        id: check
        uses: jmmaloney4/toolbox/.github/actions/check-adr-conflicts@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ inputs.repository }}
        with:
          base_ref: ${{ inputs.base_ref }}
          adr_glob: ${{ inputs.adr_glob }}
          pr_number: ${{ inputs.pr_number }}

      - name: Create and push placeholder to main
        if: steps.detect.outputs.has_new_adrs == 'true' && steps.check.outputs.has_conflict == 'false'
        uses: jmmaloney4/toolbox/.github/actions/create-adr-placeholder@main
        with:
          adr_files: /tmp/new_adrs.txt
          pr_url: ${{ inputs.pr_url }}
          base_branch: ${{ inputs.base_ref }}

      - name: Post ADR check status comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ inputs.repository }}
          HAS_NEW_ADRS: ${{ steps.detect.outputs.has_new_adrs }}
          HAS_CONFLICT: ${{ steps.check.outputs.has_conflict }}
          PR_NUMBER: ${{ inputs.pr_number }}
          ADR_GLOB: ${{ inputs.adr_glob }}
        run: |
          set -euo pipefail

          if [ "${HAS_CONFLICT}" = "true" ]; then
            # Conflict comment is already posted by the check-adr-conflicts action; nothing to add.
            exit 0
          fi

          if [ "${HAS_NEW_ADRS}" = "true" ]; then
            body="**ADR conflict check passed.** No duplicate ADR numbers detected (full-tree audit of \`${ADR_GLOB}\`)."
          else
            body="**ADR conflict check ran.** No new or modified ADR files detected in this PR; full-tree audit of \`${ADR_GLOB}\` passed with no conflicts."
          fi

          gh pr comment "$PR_NUMBER" --body "$body"
