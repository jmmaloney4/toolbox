name: '📦 pnpm'
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  pnpm:
    uses: jmmaloney4/sector7/.github/workflows/pnpm.yml@e810f9d58eaf12b58af1ebef7968f684d2ee2030 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      dry_run: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      target: release
