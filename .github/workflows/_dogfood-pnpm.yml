name: '📦 pnpm'
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  pnpm:
    uses: jmmaloney4/sector7/.github/workflows/pnpm.yml@5d4e3062f23cc6aef0a7a65e510329ad927ad8e6 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      dry_run: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      target: release
