name: '📦 pnpm'
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  contents: read
  packages: write
jobs:
  pnpm:
    uses: jmmaloney4/toolbox/.github/workflows/pnpm.yml@73b0c490c72bbea2941cf44eb9b6bb127878c7ef # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      dry_run: ${{ !startsWith(github.ref, 'refs/tags/v') }}
