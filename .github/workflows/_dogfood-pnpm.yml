name: '📦 pnpm'
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  contents: read
  packages: write
jobs:
  pnpm:
    uses: jmmaloney4/toolbox/.github/workflows/pnpm.yml@591ab2d08d3f590934b9dcf75c8c7ff084b469b0 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      dry_run: ${{ !startsWith(github.ref, 'refs/tags/v') }}
