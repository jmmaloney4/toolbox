name: Nix Setup
description: Install Nix and enable flakehub cache for GitHub Actions
inputs:
  runs-on:
    description: Runner label to determine if runs-on/actions@v2 should be used
    required: true
    type: string
  cache:
    description: Enable FlakeHub cache (set to 'false' for self-hosted runners with cache already configured)
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - if: ${{ contains(inputs.runs-on, 'runner=') }} && ${{ contains(inputs.runs-on, 's3-cache') }}
      uses: runs-on/action@742bf56072eb4845a0f94b3394673e4903c90ff0 # v2.1.0
      with:
        show_costs: true
        sccache: s3
    - uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main
    - if: ${{ inputs.cache == 'true' }}
      uses: DeterminateSystems/flakehub-cache-action@e134de896b2302c1584a7b54ff35432708607d44 # main
      # TODO: Fix this
      # with:
      # use-gha-cache: enabled
