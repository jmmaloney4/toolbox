name: Nix Setup
description: Install Nix and enable flakehub cache for GitHub Actions
inputs:
  runs-on:
    description: Runner label to determine if runs-on/actions@v2 should be used
    required: true
    type: string
  cache:
    description: Enable FlakeHub cache (set to 'false' for self-hosted runners with cache already configured)
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - if: ${{ contains(inputs.runs-on, 'runner=') }} && ${{ contains(inputs.runs-on, 's3-cache') }}
      uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2
      with:
        show_costs: true
        sccache: s3
    - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main
    - if: ${{ inputs.cache == 'true' }}
      uses: DeterminateSystems/flakehub-cache-action@6824bf2b70bf86b7dcb8c7a3d75cd399e4aa6447 # main
      # TODO: Fix this
      # with:
      # use-gha-cache: enabled
