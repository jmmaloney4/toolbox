name: Check ADR Conflicts
description: >
  Full-tree ADR uniqueness audit: scans all files matching adr_glob in the
  working tree for duplicate 3-digit number prefixes and comments on the PR
  if any conflicts are found.
inputs:
  base_ref:
    description: Base branch/ref to compare against (informational; used in log output)
    required: true
  adr_glob:
    description: ADR file glob to scan (relative to repo root, e.g. docs/internal/designs/*.md)
    required: true
  pr_number:
    description: Pull request number used for posting conflict comments
    required: true
outputs:
  has_conflict:
    description: Whether ADR number conflicts were found
    value: ${{ steps.check.outputs.has_conflict }}
runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        BASE_REF: ${{ inputs.base_ref }}
        ADR_GLOB: ${{ inputs.adr_glob }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: bash "$GITHUB_ACTION_PATH/main.sh"
